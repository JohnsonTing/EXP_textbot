AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: An AWS Serverless Application Model (SAM) template describing your function.
Parameters:
  OpenAiApiKey:
    Type: String
  TwilioSid:
    Type: String
  TwilioAuthToken:
    Type: String
Resources:
  EXPBotMessageHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EXP-Bot-Message-Handler
      Architectures:
        - x86_64
      CodeUri: ./src
      Description: ''
      Environment:
        Variables:
          SPECIFIC_AGENT_EMAIL: jeroen.hoppe@exp.uk.com
          TWILIO_FROM_NUMBER: '+447446976362'
          OPENAI_API_KEY: !Ref OpenAiApiKey
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_ACCOUNT_SID: !Ref TwilioSid
      EphemeralStorage:
        Size: 512
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Handler: index.handler
      Layers:
        - arn:aws:lambda:us-east-1:240783391752:layer:openai_beautifulsoup:5
        - arn:aws:lambda:us-east-1:240783391752:layer:twilio:2
      LoggingConfig:
        LogFormat: Text
        LogGroup: /aws/lambda/EXPBotMessageHandler
      MemorySize: 128
      PackageType: Zip
      RecursiveLoop: Terminate
      Runtime: python3.11
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto
      SnapStart:
        ApplyOn: None
      Tags: {}
      Timeout: 30
      Tracing: PassThrough
      Role: >-
        arn:aws:iam::240783391752:role/service-role/exp_bot_connected_with_dynamodb-role-a1lkof4d
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/EXPBotMessageHandler
      RetentionInDays: 14