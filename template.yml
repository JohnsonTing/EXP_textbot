# This AWS SAM template has been generated from your function's configuration.
# If your function has one or more triggers, note that the AWS resources
# associated with these triggers aren't fully specified in this template and
# include placeholder values. Open this template in AWS Infrastructure Composer
# or your favorite IDE and modify it to specify a serverless application with
# other AWS resources.
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: An AWS Serverless Application Model (SAM) template describing your function.
Parameters:
  OpenAiApiKey:
    Type: String
    NoEcho: true
  TwilioSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true
  ResendApiKey:
    Type: String
    NoEcho: true
  # [OLD — Zapier/Jira]
  # JiraWebhookUrl:
  #   Type: String
  #   NoEcho: true
  # JiraWebhookToken:
  #   Type: String
  #   NoEcho: true
  ZapierSendEmailUrl:
    Type: String
    NoEcho: true
Resources:
  EXPBotMessageHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: EXP-Bot-Message-Handler
      Architectures:
        - x86_64
      CodeUri: ./src
      Description: ''
      Environment:
        Variables:
          SPECIFIC_AGENT_EMAIL: jeroen.hoppe@exp.uk.com
          TWILIO_FROM_NUMBER: '+447446976362'
          OPENAI_API_KEY: !Ref OpenAiApiKey
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_ACCOUNT_SID: !Ref TwilioSid
          RESEND_API_KEY: !Ref ResendApiKey
          # [OLD — Zapier/Jira]
          # JIRA_WEBHOOK_URL: !Ref JiraWebhookUrl
          # JIRA_WEBHOOK_TOKEN: !Ref JiraWebhookToken
          ZAPIER_SEND_EMAIL_URL: !Ref ZapierSendEmailUrl
      EphemeralStorage:
        Size: 512
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Handler: index.handler
      Layers:
        - arn:aws:lambda:us-east-1:240783391752:layer:openai_beautifulsoup:5
        - arn:aws:lambda:us-east-1:240783391752:layer:twilio:2
      LoggingConfig:
        LogFormat: Text
        LogGroup: /aws/lambda/EXPBotMessageHandler
      MemorySize: 1024
      PackageType: Zip
      RecursiveLoop: Terminate
      Runtime: python3.11
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto
      SnapStart:
        ApplyOn: None
      Tags: {}
      Timeout: 30
      Tracing: PassThrough
      Policies:
        - AWSLambdaBasicExecutionRole
        - AmazonDynamoDBFullAccess 
      # Events:
      #   DailyCheckForEngagement:
      #     Type: ScheduleV2
      #     Properties:
      #       ScheduleExpression: "cron(0 9 * * ? *)"
      #       FlexibleTimeWindow:
      #         Mode: OFF
      #       Input: '{"requestContext": {"http": {"method": "POST", "path": "/daily-check"}}}' 
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/EXPBotMessageHandler
      RetentionInDays: 14

  EXPAgentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EXP_agents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  EXPMetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EXP_agent_metrics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: agent_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: event_type
          AttributeType: S
      KeySchema:
        - AttributeName: agent_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: event_type-timestamp-index
          KeySchema:
            - AttributeName: event_type
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL